services:
  mysql:
    image: mysql:8.4
    container_name: notes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-notes_db}
      MYSQL_USER: ${MYSQL_USER:-notes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-notes_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./note-app
      dockerfile: Dockerfile
    container_name: notes-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-notes_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-notes_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-notes_pass}
      JWT_SECRET: ${JWT_SECRET:-this-is-a-very-long-secret-key-for-jwt-signing-32chars-min}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
