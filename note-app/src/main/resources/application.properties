server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notes_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notes_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notes_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:this-is-a-very-long-secret-key-for-jwt-signing-32chars-min}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Comma-separated origins for the Vercel UI (and local split frontend). Empty → localhost patterns only.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
