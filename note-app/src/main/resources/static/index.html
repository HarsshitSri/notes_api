<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes API</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>Notes</h1>
          <p class="tagline">Personal notes API client</p>
        </div>
      </div>
      <div id="session-bar" class="session-bar hidden">
        <span id="session-user" class="session-user"></span>
        <button type="button" id="logout-btn" class="btn btn-ghost">Log out</button>
      </div>
    </header>

    <div id="alert" class="alert hidden" role="status"></div>

    <!-- Auth -->
    <section id="auth-view" class="panel">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="login">Log in</button>
        <button type="button" class="tab" data-tab="register">Register</button>
      </div>

      <form id="login-form" class="form">
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="1" autocomplete="current-password">
        </label>
        <button type="submit" class="btn btn-primary">Log in</button>
      </form>

      <form id="register-form" class="form hidden">
        <label>
          Username
          <input type="text" name="username" required minlength="3" maxlength="50" autocomplete="username">
        </label>
        <label>
          Email
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
        <label>
          Password
          <input type="password" name="password" required minlength="6" autocomplete="new-password">
        </label>
        <button type="submit" class="btn btn-primary">Create account</button>
        <p class="hint">After registering, log in to receive a JWT.</p>
      </form>
    </section>

    <!-- Notes workspace -->
    <section id="notes-view" class="hidden">
      <div class="workspace">
        <aside class="sidebar">
          <div class="toolbar">
            <form id="search-form" class="search-form">
              <input type="search" id="search-input" name="search" placeholder="Search title or content" aria-label="Search notes">
              <button type="submit" class="btn btn-secondary">Search</button>
            </form>
            <div class="filters">
              <label>
                Sort
                <select id="sort-by">
                  <option value="updatedAt">Updated</option>
                  <option value="createdAt">Created</option>
                  <option value="title">Title</option>
                </select>
              </label>
              <label>
                Page size
                <select id="page-size">
                  <option value="5">5</option>
                  <option value="10" selected>10</option>
                  <option value="20">20</option>
                </select>
              </label>
            </div>
            <button type="button" id="new-note-btn" class="btn btn-primary">New note</button>
          </div>

          <ul id="notes-list" class="notes-list" aria-live="polite"></ul>

          <div class="pager">
            <button type="button" id="prev-page" class="btn btn-ghost" disabled>Previous</button>
            <span id="page-info">Page 1</span>
            <button type="button" id="next-page" class="btn btn-ghost" disabled>Next</button>
          </div>
        </aside>

        <main class="editor-panel">
          <div id="empty-editor" class="empty-state">
            <h2>Select or create a note</h2>
            <p>Use the list to open a note, or click <strong>New note</strong> to add one.</p>
          </div>

          <form id="note-form" class="form note-form hidden">
            <input type="hidden" id="note-id" value="">
            <label>
              Title
              <input type="text" id="note-title" name="title" required maxlength="100" placeholder="Note title">
            </label>
            <label>
              Content
              <textarea id="note-content" name="content" required rows="12" placeholder="Write your note…"></textarea>
            </label>
            <p id="note-meta" class="meta"></p>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary" id="save-note-btn">Save</button>
              <button type="button" class="btn btn-danger" id="delete-note-btn">Delete</button>
            </div>
          </form>
        </main>
      </div>
    </section>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
